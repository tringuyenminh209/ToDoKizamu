AWSTemplateFormatVersion: '2010-09-09'
Description: >
  TodoApp — AWS Academy Lab Stack (us-east-1)
  Cost-optimized: NO Elastic IP, NO NAT Gateway, NO CloudFront, NO WAF.
  ECS Fargate runs in public subnet (AssignPublicIp: ENABLED) to reach ECR/OpenAI/FCM.
  RDS + Redis isolated in private subnets (VPC-internal access only).
  S3 Gateway Endpoint (FREE) eliminates data-transfer fees for S3.
  Supports both LabRole (AWS Academy) and custom IAM roles.

# ─────────────────────────────────────────────────────────────
# COST ESTIMATE (us-east-1, test env, ~30 days)
# ─────────────────────────────────────────────────────────────
# ALB:              ~$16/month (fixed) + $0.008/LCU
# ECS Fargate 3×:   ~$11/month (3 × 0.25vCPU/0.5GB × 24h × 30d)
# RDS db.t3.micro:  ~$13/month (single AZ)
# Redis cache.t3.micro: ~$12/month
# S3:               ~$0.02/month (< 1GB)
# SQS:              ~$0 (free tier 1M requests)
# Secrets Manager:  ~$0.40/month
# ─────────────────────────────────────────────────────────────
# Total estimate:   ~$52/month  ← fits AWS Academy $50-100 budget
# ─────────────────────────────────────────────────────────────
# Removed vs production: NAT GW ($32), CloudFront ($1-5), WAF ($5),
#   Elastic IP ($3.6), Multi-AZ RDS ($13), Route53 ($0.5)
# ─────────────────────────────────────────────────────────────

# =============================================================
# PARAMETERS
# =============================================================
Parameters:
  ProjectName:
    Type: String
    Default: todoapp

  # ── AWS Academy IAM ──────────────────────────────────────
  UseLabRole:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      "true"  = use existing LabRole (AWS Academy Learner Lab — cannot create IAM roles).
      "false" = create custom IAM roles (requires IAM permissions).

  # ── Network ──────────────────────────────────────────────
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: Public AZ-a — ALB + ECS tasks
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.5.0/24
    Description: Public AZ-b — ALB only (2nd AZ required by ALB)
  PrivateDBSubnet1Cidr:
    Type: String
    Default: 10.0.3.0/24
    Description: Private AZ-a — RDS + Redis
  PrivateDBSubnet2Cidr:
    Type: String
    Default: 10.0.4.0/24
    Description: Private AZ-b — RDS DBSubnetGroup requires 2 AZs

  # ── ECS Container ────────────────────────────────────────
  NextJSImageUri:
    Type: String
    Default: ""
    Description: "ECR URI for Next.js 15. Leave blank for placeholder."
  LaravelAPIImageUri:
    Type: String
    Default: ""
    Description: ECR URI for Laravel 11 API
  LaravelReverbImageUri:
    Type: String
    Default: ""
    Description: ECR URI for Laravel Reverb WebSocket
  # Lab: reduced CPU/Memory to minimize Fargate cost
  FargateCpu:
    Type: Number
    Default: 256
    AllowedValues: [256, 512, 1024]
    Description: "256 = 0.25 vCPU (~$3.6/mo per task)"
  FargateMemory:
    Type: Number
    Default: 512
    AllowedValues: [512, 1024, 2048]

  # ── RDS ──────────────────────────────────────────────────
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues: [db.t3.micro, db.t3.small, db.t3.medium]
  DBName:
    Type: String
    Default: todoapp
  DBUsername:
    Type: String
    Default: admin
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: RDS master password (min 8 chars)

  # ── ElastiCache ───────────────────────────────────────────
  CacheNodeType:
    Type: String
    Default: cache.t3.micro
    AllowedValues: [cache.t3.micro, cache.t3.small]

  # ── App Secrets ───────────────────────────────────────────
  AppKey:
    Type: String
    NoEcho: true
    Default: "base64:REPLACE_ME"
    Description: "Laravel APP_KEY (base64:xxxxx)"
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: OpenAI API key (optional for lab)

# =============================================================
# CONDITIONS
# =============================================================
Conditions:
  CreateRoles:   !Equals [!Ref UseLabRole, "false"]
  UseLabRole:    !Equals [!Ref UseLabRole, "true"]
  HasNextJS:     !Not [!Equals [!Ref NextJSImageUri, ""]]
  HasLaravel:    !Not [!Equals [!Ref LaravelAPIImageUri, ""]]
  HasReverb:     !Not [!Equals [!Ref LaravelReverbImageUri, ""]]

# =============================================================
# RESOURCES
# =============================================================
Resources:

  # ───────────────────────────────────────────────────────────
  # 1. VPC
  # ───────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-vpc

  # ───────────────────────────────────────────────────────────
  # 2. SUBNETS
  # ─────────────────────────────────────────────────────────
  # PUBLIC: ALB + ECS (public IP = no NAT needed)
  # PRIVATE: RDS + Redis (VPC-internal only, no internet)
  # ───────────────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-public-1a

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-public-1b

  PrivateDBSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-private-db-1a

  PrivateDBSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-private-db-1b

  # ───────────────────────────────────────────────────────────
  # 3. INTERNET GATEWAY (NO Elastic IP — IGW doesn't need EIP)
  # ───────────────────────────────────────────────────────────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ───────────────────────────────────────────────────────────
  # 4. PUBLIC ROUTE TABLE → IGW
  # (ECS tasks in public subnet use this to reach ECR / OpenAI / FCM)
  # ───────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-public-rt

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ───────────────────────────────────────────────────────────
  # 5. PRIVATE ROUTE TABLE (no default route — DB/Cache only need intra-VPC)
  # ───────────────────────────────────────────────────────────
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-private-rt

  PrivateDBSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDBSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateDBSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDBSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ───────────────────────────────────────────────────────────
  # 6. S3 GATEWAY ENDPOINT (FREE — no data transfer fees for S3)
  # Gateway Endpoint: only S3 and DynamoDB are free.
  # Interface Endpoints (SQS, ECR) cost $7/month each → skip for lab.
  # ───────────────────────────────────────────────────────────
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateRouteTable

  # ───────────────────────────────────────────────────────────
  # 7. SECURITY GROUPS
  # ───────────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — HTTP from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-alb-sg

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks — allow from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Next.js :3000
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Laravel API :8080
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Laravel Reverb :8081
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-app-sg

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS MySQL — from App SG only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppSecurityGroup
          Description: MySQL :3306 from ECS tasks
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-db-sg

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache Redis — from App SG only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref AppSecurityGroup
          Description: Redis :6379 from ECS tasks
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-redis-sg

  # ───────────────────────────────────────────────────────────
  # 8. IAM ROLES
  # Condition: CreateRoles = false → skipped, uses LabRole instead
  # LabRole ARN: arn:aws:iam::{AccountId}:role/LabRole
  # ───────────────────────────────────────────────────────────
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateRoles
    Properties:
      RoleName: !Sub ${ProjectName}-lab-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecret

  ECSTaskRole:
    Type: AWS::IAM::Role
    Condition: CreateRoles
    Properties:
      RoleName: !Sub ${ProjectName}-lab-ecs-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub ${S3Bucket.Arn}/*
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ProjectName}*
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecret

  # ───────────────────────────────────────────────────────────
  # 9. SECRETS MANAGER
  # ───────────────────────────────────────────────────────────
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${ProjectName}/lab/app
      Description: TodoApp Lab — DB password, APP_KEY, OpenAI key
      SecretString: !Sub |
        {
          "DB_USERNAME": "${DBUsername}",
          "DB_PASSWORD": "${DBPassword}",
          "APP_KEY": "${AppKey}",
          "OPENAI_API_KEY": "${OpenAIApiKey}"
        }

  # ───────────────────────────────────────────────────────────
  # 10. S3 + SQS + SNS
  # ───────────────────────────────────────────────────────────
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-lab-storage-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST, DELETE]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  SQSDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-lab-jobs-dlq
      MessageRetentionPeriod: 345600

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-lab-jobs
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SQSDeadLetterQueue.Arn
        maxReceiveCount: 3

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-lab-notifications

  # ───────────────────────────────────────────────────────────
  # 11. ECR (3 repositories)
  # ───────────────────────────────────────────────────────────
  ECRFrontend:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-frontend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep 5 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}

  ECRBackend:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep 5 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}

  ECRReverb:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-reverb
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep 5 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}

  # ───────────────────────────────────────────────────────────
  # 12. RDS MySQL 8.0 (single AZ — no Multi-AZ for lab)
  # ───────────────────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub ${ProjectName} lab DB subnet group
      SubnetIds:
        - !Ref PrivateDBSubnet1
        - !Ref PrivateDBSubnet2

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-lab-mysql
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: "8.0"
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      StorageType: gp2
      StorageEncrypted: false
      MultiAZ: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 1
      AutoMinorVersionUpgrade: true
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-mysql

  # ───────────────────────────────────────────────────────────
  # 13. ELASTICACHE REDIS 7 (single node)
  # ───────────────────────────────────────────────────────────
  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: !Sub ${ProjectName} lab Redis subnet group
      SubnetIds:
        - !Ref PrivateDBSubnet1
        - !Ref PrivateDBSubnet2

  ElastiCacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub ${ProjectName}-lab Redis 7 (single node)
      ReplicationGroupId: !Sub ${ProjectName}-lab-redis
      AutomaticFailoverEnabled: false
      NumCacheClusters: 1
      CacheNodeType: !Ref CacheNodeType
      Engine: redis
      EngineVersion: "7.1"
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      AtRestEncryptionEnabled: false
      TransitEncryptionEnabled: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-redis

  # ───────────────────────────────────────────────────────────
  # 14. ECS CLUSTER + LOG GROUP
  # ───────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-lab-cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: disabled

  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-lab
      RetentionInDays: 7

  # ───────────────────────────────────────────────────────────
  # 15. ALB + TARGET GROUPS + LISTENERS
  # ───────────────────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-lab-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-lab-alb

  ALBTargetGroupNextJS:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-lab-nextjs-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBTargetGroupAPI:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-lab-api-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBTargetGroupReverb:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-lab-reverb-tg
      Port: 8081
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /
      HealthCheckPort: "8081"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroupNextJS

  ALBListenerRuleAPI:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTP
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/*
              - /sanctum/*
              - /broadcasting/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroupAPI

  ALBListenerRuleReverb:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTP
      Priority: 20
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /app/*
              - /apps/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroupReverb

  # ───────────────────────────────────────────────────────────
  # 16. ECS TASK DEFINITIONS
  # IAM: UseLabRole=true  → LabRole ARN
  #      UseLabRole=false → custom roles created above
  # ECS: AssignPublicIp: ENABLED (runs in public subnet, no NAT needed)
  # ───────────────────────────────────────────────────────────

  NextJSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-lab-nextjs
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      ExecutionRoleArn: !If
        - CreateRoles
        - !GetAtt ECSTaskExecutionRole.Arn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      TaskRoleArn: !If
        - CreateRoles
        - !GetAtt ECSTaskRole.Arn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      ContainerDefinitions:
        - Name: nextjs
          Image: !If
            - HasNextJS
            - !Ref NextJSImageUri
            - !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRFrontend}:latest
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub http://${ALB.DNSName}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: nextjs
          Essential: true

  LaravelAPITaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-lab-laravel-api
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      ExecutionRoleArn: !If
        - CreateRoles
        - !GetAtt ECSTaskExecutionRole.Arn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      TaskRoleArn: !If
        - CreateRoles
        - !GetAtt ECSTaskRole.Arn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      ContainerDefinitions:
        - Name: laravel-api
          Image: !If
            - HasLaravel
            - !Ref LaravelAPIImageUri
            - !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRBackend}:latest
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: APP_ENV
              Value: local
            - Name: APP_DEBUG
              Value: "true"
            - Name: APP_PORT
              Value: "8080"
            - Name: DB_CONNECTION
              Value: mysql
            - Name: DB_HOST
              Value: !GetAtt RDSInstance.Endpoint.Address
            - Name: DB_PORT
              Value: "3306"
            - Name: DB_DATABASE
              Value: !Ref DBName
            - Name: REDIS_HOST
              Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
            - Name: REDIS_PORT
              Value: "6379"
            - Name: CACHE_DRIVER
              Value: redis
            - Name: SESSION_DRIVER
              Value: redis
            - Name: QUEUE_CONNECTION
              Value: sqs
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: AWS_SQS_QUEUE
              Value: !Ref SQSQueue
            - Name: FILESYSTEM_DISK
              Value: s3
            - Name: AWS_BUCKET
              Value: !Ref S3Bucket
            - Name: BROADCAST_DRIVER
              Value: reverb
          Secrets:
            - Name: APP_KEY
              ValueFrom: !Sub "${AppSecret}:APP_KEY::"
            - Name: DB_USERNAME
              ValueFrom: !Sub "${AppSecret}:DB_USERNAME::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "${AppSecret}:DB_PASSWORD::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "${AppSecret}:OPENAI_API_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: laravel-api
          Essential: true

  LaravelReverbTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-lab-laravel-reverb
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      ExecutionRoleArn: !If
        - CreateRoles
        - !GetAtt ECSTaskExecutionRole.Arn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      TaskRoleArn: !If
        - CreateRoles
        - !GetAtt ECSTaskRole.Arn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      ContainerDefinitions:
        - Name: laravel-reverb
          Image: !If
            - HasReverb
            - !Ref LaravelReverbImageUri
            - !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRReverb}:latest
          PortMappings:
            - ContainerPort: 8081
              Protocol: tcp
          Environment:
            - Name: APP_ENV
              Value: local
            - Name: REVERB_SERVER_HOST
              Value: "0.0.0.0"
            - Name: REVERB_SERVER_PORT
              Value: "8081"
            - Name: REVERB_APP_ID
              Value: !Sub ${ProjectName}-reverb
            - Name: REVERB_APP_KEY
              Value: !Sub ${ProjectName}-reverb-key
            - Name: BROADCAST_DRIVER
              Value: reverb
            - Name: CACHE_DRIVER
              Value: redis
            - Name: REDIS_HOST
              Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
            - Name: REDIS_PORT
              Value: "6379"
          Secrets:
            - Name: APP_KEY
              ValueFrom: !Sub "${AppSecret}:APP_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: laravel-reverb
          Essential: true

  # ───────────────────────────────────────────────────────────
  # 17. ECS SERVICES
  # AssignPublicIp: ENABLED — no NAT Gateway needed!
  # Task runs in public subnet, gets ephemeral public IP from AWS pool.
  # ───────────────────────────────────────────────────────────
  NextJSECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerHTTP
    Properties:
      ServiceName: !Sub ${ProjectName}-lab-nextjs-svc
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref NextJSTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
          SecurityGroups:
            - !Ref AppSecurityGroup
      LoadBalancers:
        - ContainerName: nextjs
          ContainerPort: 3000
          TargetGroupArn: !Ref ALBTargetGroupNextJS
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

  LaravelAPIECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerRuleAPI
    Properties:
      ServiceName: !Sub ${ProjectName}-lab-api-svc
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref LaravelAPITaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
          SecurityGroups:
            - !Ref AppSecurityGroup
      LoadBalancers:
        - ContainerName: laravel-api
          ContainerPort: 8080
          TargetGroupArn: !Ref ALBTargetGroupAPI
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

  LaravelReverbECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerRuleReverb
    Properties:
      ServiceName: !Sub ${ProjectName}-lab-reverb-svc
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref LaravelReverbTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
          SecurityGroups:
            - !Ref AppSecurityGroup
      LoadBalancers:
        - ContainerName: laravel-reverb
          ContainerPort: 8081
          TargetGroupArn: !Ref ALBTargetGroupReverb
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

  # ───────────────────────────────────────────────────────────
  # 18. CODEBUILD (CI/CD — trigger từ GitHub Actions)
  # ───────────────────────────────────────────────────────────
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-lab-build
      ServiceRole: !If
        - CreateRoles
        - !GetAtt CodeBuildRole.Arn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Artifacts:
        Type: NO_ARTIFACTS
      Cache:
        Type: LOCAL
        Modes: [LOCAL_DOCKER_LAYER_CACHE]
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: ECR_FRONTEND_URI
            Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRFrontend}
          - Name: ECR_BACKEND_URI
            Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRBackend}
          - Name: ECR_REVERB_URI
            Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRReverb}
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:-latest}
            build:
              commands:
                - docker compose build --parallel
                - docker tag todoapp-frontend:latest $ECR_FRONTEND_URI:$IMAGE_TAG
                - docker tag todoapp-backend:latest $ECR_BACKEND_URI:$IMAGE_TAG
                - docker tag todoapp-reverb:latest $ECR_REVERB_URI:$IMAGE_TAG
            post_build:
              commands:
                - docker push $ECR_FRONTEND_URI:$IMAGE_TAG
                - docker push $ECR_BACKEND_URI:$IMAGE_TAG
                - docker push $ECR_REVERB_URI:$IMAGE_TAG
                - printf '[{"name":"nextjs","imageUri":"%s"}]' $ECR_FRONTEND_URI:$IMAGE_TAG > imagedefs-frontend.json
                - printf '[{"name":"laravel-api","imageUri":"%s"}]' $ECR_BACKEND_URI:$IMAGE_TAG > imagedefs-backend.json
                - printf '[{"name":"laravel-reverb","imageUri":"%s"}]' $ECR_REVERB_URI:$IMAGE_TAG > imagedefs-reverb.json
          artifacts:
            files: [imagedefs-frontend.json, imagedefs-backend.json, imagedefs-reverb.json]

  CodeBuildRole:
    Type: AWS::IAM::Role
    Condition: CreateRoles
    Properties:
      RoleName: !Sub ${ProjectName}-lab-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
      Policies:
        - PolicyName: Logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: "*"

# =============================================================
# OUTPUTS
# =============================================================
Outputs:
  AppURL:
    Description: "TodoApp URL (via ALB — use this to access the app)"
    Value: !Sub http://${ALB.DNSName}

  ALBDNSName:
    Description: ALB DNS name
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${ProjectName}-lab-alb-dns

  RDSEndpoint:
    Description: RDS MySQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ${ProjectName}-lab-rds-endpoint

  RedisEndpoint:
    Description: ElastiCache Redis primary endpoint
    Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: !Sub ${ProjectName}-lab-redis-endpoint

  S3BucketName:
    Description: S3 storage bucket
    Value: !Ref S3Bucket
    Export:
      Name: !Sub ${ProjectName}-lab-s3-bucket

  SQSQueueUrl:
    Description: SQS job queue URL
    Value: !Ref SQSQueue
    Export:
      Name: !Sub ${ProjectName}-lab-sqs-url

  ECSClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${ProjectName}-lab-ecs-cluster

  ECRFrontendUri:
    Description: ECR Frontend URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRFrontend}

  ECRBackendUri:
    Description: ECR Backend URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRBackend}

  ECRReverbUri:
    Description: ECR Reverb URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRReverb}

  AppSecretArn:
    Description: Secrets Manager ARN
    Value: !Ref AppSecret

  CostNote:
    Description: "Estimated monthly cost (us-east-1, lab usage)"
    Value: "~$52/month: ALB $16 + Fargate 3x $11 + RDS $13 + Redis $12 + misc $0"
