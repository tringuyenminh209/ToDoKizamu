AWSTemplateFormatVersion: '2010-09-09'
Description: "TodoApp — AWS Architecture (ap-northeast-1) — generated from aws-architecture.drawio"

# =============================================================
# PARAMETERS
# =============================================================
Parameters:
  ProjectName:
    Type: String
    Default: todoapp

  Environment:
    Type: String
    Default: test
    AllowedValues: [test, prod]

  # ── Network ──────────────────────────────────────────────
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.5.0/24
    Description: 2nd public subnet (different AZ — required for ALB)
  PrivateAppSubnetCidr:
    Type: String
    Default: 10.0.2.0/24
  PrivateDBSubnet1Cidr:
    Type: String
    Default: 10.0.3.0/24
  PrivateDBSubnet2Cidr:
    Type: String
    Default: 10.0.4.0/24
    Description: 2nd DB subnet (different AZ — required for RDS)

  # ── ECS / Container ──────────────────────────────────────
  NextJSImageUri:
    Type: String
    Default: ""
    Description: "ECR URI for Next.js 15. Leave blank to use {account}.dkr.ecr.{region}.amazonaws.com/{repo}:latest"
  LaravelAPIImageUri:
    Type: String
    Default: ""
    Description: ECR URI for Laravel 11 API
  LaravelReverbImageUri:
    Type: String
    Default: ""
    Description: ECR URI for Laravel Reverb WebSocket
  FargateCpu:
    Type: Number
    Default: 512
    AllowedValues: [256, 512, 1024, 2048, 4096]
  FargateMemory:
    Type: Number
    Default: 1024
    AllowedValues: [512, 1024, 2048, 4096, 8192]

  # ── RDS ──────────────────────────────────────────────────
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues: [db.t3.micro, db.t3.small, db.t3.medium, db.r6g.large]
  DBName:
    Type: String
    Default: todoapp
  DBUsername:
    Type: String
    Default: admin
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: RDS master password (min 8 chars)

  # ── ElastiCache ───────────────────────────────────────────
  CacheNodeType:
    Type: String
    Default: cache.t3.micro
    AllowedValues: [cache.t3.micro, cache.t3.small, cache.r6g.large]

  # ── App Secrets ───────────────────────────────────────────
  AppKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Laravel APP_KEY (e.g. base64:xxxxx...)"
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: OpenAI API key for AI features

  # ── CloudFront / ACM ─────────────────────────────────────
  CloudFrontCertificateArn:
    Type: String
    Default: ""
    Description: "ACM cert ARN (must be in us-east-1 for CloudFront). Leave blank for *.cloudfront.net"
  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain (e.g. todoapp.example.com). Leave blank to skip Route53 record"
  HostedZoneId:
    Type: String
    Default: ""
    Description: Route53 Hosted Zone ID (required only when DomainName is set)

# =============================================================
# CONDITIONS
# =============================================================
Conditions:
  IsProd:       !Equals [!Ref Environment, prod]
  HasDomain:    !Not [!Equals [!Ref DomainName, ""]]
  HasCert:      !Not [!Equals [!Ref CloudFrontCertificateArn, ""]]
  HasNextJS:    !Not [!Equals [!Ref NextJSImageUri, ""]]
  HasLaravel:   !Not [!Equals [!Ref LaravelAPIImageUri, ""]]
  HasReverb:    !Not [!Equals [!Ref LaravelReverbImageUri, ""]]

# =============================================================
# RESOURCES
# =============================================================
Resources:

  # ───────────────────────────────────────────────────────────
  # 1. VPC
  # ───────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-vpc

  # ───────────────────────────────────────────────────────────
  # 2. SUBNETS
  # ───────────────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-1a

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-1c

  PrivateAppSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateAppSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-app-1a

  PrivateDBSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-db-1a

  PrivateDBSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-db-1c

  # ───────────────────────────────────────────────────────────
  # 3. INTERNET GATEWAY
  # ───────────────────────────────────────────────────────────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ───────────────────────────────────────────────────────────
  # 4. PUBLIC ROUTE TABLE
  # ───────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-rt

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ───────────────────────────────────────────────────────────
  # 5. NAT GATEWAY (public subnet → private outbound)
  # ───────────────────────────────────────────────────────────
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-nat-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-nat

  # ───────────────────────────────────────────────────────────
  # 6. PRIVATE ROUTE TABLES
  # ───────────────────────────────────────────────────────────
  PrivateAppRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-app-rt

  PrivateAppDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateAppRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateAppSubnetRTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnet1
      RouteTableId: !Ref PrivateAppRouteTable

  PrivateDBRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-db-rt

  PrivateDBSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDBSubnet1
      RouteTableId: !Ref PrivateDBRouteTable

  PrivateDBSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDBSubnet2
      RouteTableId: !Ref PrivateDBRouteTable

  # ───────────────────────────────────────────────────────────
  # 7. SECURITY GROUPS
  # ───────────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — allow HTTP/HTTPS from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-alb-sg

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks — allow from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Next.js :3000 from ALB
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Laravel API :8080 from ALB
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Laravel Reverb :8081 from ALB
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-app-sg

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS MySQL — allow from App SG only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppSecurityGroup
          Description: MySQL :3306 from App tasks
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-db-sg

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache Redis — allow from App SG only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref AppSecurityGroup
          Description: Redis :6379 from App tasks
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-redis-sg

  # ───────────────────────────────────────────────────────────
  # 8. IAM ROLES
  # ───────────────────────────────────────────────────────────
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAndSSM
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - ssm:GetParameters
                  - kms:Decrypt
                Resource: "*"

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-ecs-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # S3 — file uploads (edges: Laravel API → S3)
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetObjectSignedUrl
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub ${S3Bucket.Arn}/*
              # SQS — job dispatch (edges: Laravel API → SQS)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource:
                  - !GetAtt SQSQueue.Arn
                  - !GetAtt SQSDeadLetterQueue.Arn
              # SNS — pub/sub (edges: SQS → SNS)
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic
              # CloudWatch Logs (edges: ECS Cluster → CloudWatch)
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ProjectName}*
              # Secrets Manager (edges: Laravel API → Secrets Manager)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecret

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
      Policies:
        - PolicyName: CodeBuildLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - s3:GetObject
                  - s3:PutObject
                Resource: "*"

  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS

  # ───────────────────────────────────────────────────────────
  # 9. SECRETS MANAGER (static secrets only — DB_HOST set via env var)
  # ───────────────────────────────────────────────────────────
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/app
      Description: TodoApp — DB password, APP_KEY, OpenAI key
      SecretString: !Sub |
        {
          "DB_USERNAME": "${DBUsername}",
          "DB_PASSWORD": "${DBPassword}",
          "APP_KEY": "${AppKey}",
          "OPENAI_API_KEY": "${OpenAIApiKey}"
        }

  # ───────────────────────────────────────────────────────────
  # 10. S3 + SQS + SNS
  # ───────────────────────────────────────────────────────────
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-storage-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST, DELETE]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  SQSDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-jobs-dlq
      MessageRetentionPeriod: 1209600

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-jobs
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SQSDeadLetterQueue.Arn
        maxReceiveCount: 3

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-${Environment}-notifications

  # ───────────────────────────────────────────────────────────
  # 11. ECR REPOSITORIES (3 repos: frontend / backend / reverb)
  # ───────────────────────────────────────────────────────────
  ECRFrontend:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-frontend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}

  ECRBackend:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}

  ECRReverb:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-reverb
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}

  # ───────────────────────────────────────────────────────────
  # 12. RDS MySQL 8.0 + Subnet Group
  # ───────────────────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub ${ProjectName} DB subnet group — 2 AZs
      SubnetIds:
        - !Ref PrivateDBSubnet1
        - !Ref PrivateDBSubnet2

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-${Environment}-mysql
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: "8.0"
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: !If [IsProd, true, false]
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "18:00-19:00"
      PreferredMaintenanceWindow: "sun:19:30-sun:20:30"
      AutoMinorVersionUpgrade: true
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-mysql

  # ───────────────────────────────────────────────────────────
  # 13. ELASTICACHE REDIS 7 + Subnet Group
  # ───────────────────────────────────────────────────────────
  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: !Sub ${ProjectName} Redis subnet group
      SubnetIds:
        - !Ref PrivateDBSubnet1
        - !Ref PrivateDBSubnet2

  ElastiCacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub ${ProjectName}-${Environment} Redis 7
      ReplicationGroupId: !Sub ${ProjectName}-${Environment}-redis
      AutomaticFailoverEnabled: false
      NumCacheClusters: 1
      CacheNodeType: !Ref CacheNodeType
      Engine: redis
      EngineVersion: "7.1"
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-redis

  # ───────────────────────────────────────────────────────────
  # 14. ECS CLUSTER + LOG GROUP
  # ───────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-${Environment}-cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-${Environment}
      RetentionInDays: 30

  # ───────────────────────────────────────────────────────────
  # 15. ALB + TARGET GROUPS + LISTENERS
  # ───────────────────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-alb

  # Target Groups (ip type for Fargate awsvpc)
  ALBTargetGroupNextJS:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-nextjs-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBTargetGroupAPI:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-api-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBTargetGroupReverb:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-reverb-tg
      Port: 8081
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /
      HealthCheckPort: "8081"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # Default listener → Next.js; rules forward /api/* and /app/*
  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroupNextJS

  ALBListenerRuleAPI:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTP
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/*
              - /sanctum/*
              - /broadcasting/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroupAPI

  ALBListenerRuleReverb:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTP
      Priority: 20
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /app/*
              - /apps/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroupReverb

  # ───────────────────────────────────────────────────────────
  # 16. ECS TASK DEFINITIONS
  # ───────────────────────────────────────────────────────────

  # Next.js 15 — port 3000
  NextJSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-${Environment}-nextjs
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: nextjs
          Image: !If
            - HasNextJS
            - !Ref NextJSImageUri
            - !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRFrontend}:latest
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub http://${ALB.DNSName}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: nextjs
          Essential: true

  # Laravel 11 API — port 8080
  LaravelAPITaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-${Environment}-laravel-api
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: laravel-api
          Image: !If
            - HasLaravel
            - !Ref LaravelAPIImageUri
            - !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRBackend}:latest
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: APP_ENV
              Value: !Ref Environment
            - Name: APP_DEBUG
              Value: "false"
            - Name: APP_PORT
              Value: "8080"
            - Name: DB_CONNECTION
              Value: mysql
            - Name: DB_HOST
              Value: !GetAtt RDSInstance.Endpoint.Address
            - Name: DB_PORT
              Value: "3306"
            - Name: DB_DATABASE
              Value: !Ref DBName
            - Name: REDIS_HOST
              Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
            - Name: REDIS_PORT
              Value: "6379"
            - Name: CACHE_DRIVER
              Value: redis
            - Name: SESSION_DRIVER
              Value: redis
            - Name: QUEUE_CONNECTION
              Value: sqs
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: AWS_SQS_QUEUE
              Value: !Ref SQSQueue
            - Name: FILESYSTEM_DISK
              Value: s3
            - Name: AWS_BUCKET
              Value: !Ref S3Bucket
            - Name: BROADCAST_DRIVER
              Value: reverb
          Secrets:
            - Name: APP_KEY
              ValueFrom: !Sub "${AppSecret}:APP_KEY::"
            - Name: DB_USERNAME
              ValueFrom: !Sub "${AppSecret}:DB_USERNAME::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "${AppSecret}:DB_PASSWORD::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "${AppSecret}:OPENAI_API_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: laravel-api
          Essential: true

  # Laravel Reverb WebSocket — port 8081
  LaravelReverbTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-${Environment}-laravel-reverb
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: laravel-reverb
          Image: !If
            - HasReverb
            - !Ref LaravelReverbImageUri
            - !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRReverb}:latest
          PortMappings:
            - ContainerPort: 8081
              Protocol: tcp
          Environment:
            - Name: APP_ENV
              Value: !Ref Environment
            - Name: REVERB_SERVER_HOST
              Value: "0.0.0.0"
            - Name: REVERB_SERVER_PORT
              Value: "8081"
            - Name: REVERB_APP_ID
              Value: !Sub ${ProjectName}-reverb
            - Name: REVERB_APP_KEY
              Value: !Sub ${ProjectName}-reverb-key
            - Name: BROADCAST_DRIVER
              Value: reverb
            - Name: CACHE_DRIVER
              Value: redis
            - Name: REDIS_HOST
              Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
            - Name: REDIS_PORT
              Value: "6379"
          Secrets:
            - Name: APP_KEY
              ValueFrom: !Sub "${AppSecret}:APP_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: laravel-reverb
          Essential: true

  # ───────────────────────────────────────────────────────────
  # 17. ECS SERVICES
  # ───────────────────────────────────────────────────────────
  NextJSECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerHTTP
    Properties:
      ServiceName: !Sub ${ProjectName}-${Environment}-nextjs-svc
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref NextJSTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateAppSubnet1
          SecurityGroups:
            - !Ref AppSecurityGroup
      LoadBalancers:
        - ContainerName: nextjs
          ContainerPort: 3000
          TargetGroupArn: !Ref ALBTargetGroupNextJS
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      DeploymentController:
        Type: ECS

  LaravelAPIECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerRuleAPI
    Properties:
      ServiceName: !Sub ${ProjectName}-${Environment}-api-svc
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref LaravelAPITaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateAppSubnet1
          SecurityGroups:
            - !Ref AppSecurityGroup
      LoadBalancers:
        - ContainerName: laravel-api
          ContainerPort: 8080
          TargetGroupArn: !Ref ALBTargetGroupAPI
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      DeploymentController:
        Type: ECS

  LaravelReverbECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerRuleReverb
    Properties:
      ServiceName: !Sub ${ProjectName}-${Environment}-reverb-svc
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref LaravelReverbTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateAppSubnet1
          SecurityGroups:
            - !Ref AppSecurityGroup
      LoadBalancers:
        - ContainerName: laravel-reverb
          ContainerPort: 8081
          TargetGroupArn: !Ref ALBTargetGroupReverb
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      DeploymentController:
        Type: ECS

  # ───────────────────────────────────────────────────────────
  # 18. WAF (REGIONAL — attached to ALB)
  # Note: CloudFront WAF requires CLOUDFRONT scope in us-east-1
  # ───────────────────────────────────────────────────────────
  WAFWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-waf
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      Rules:
        - Name: CommonRules
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub ${ProjectName}-common
        - Name: BadInputs
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub ${ProjectName}-badinput
        - Name: RateLimit
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub ${ProjectName}-ratelimit
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub ${ProjectName}-${Environment}-waf

  WAFALBAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref ALB
      WebACLArn: !GetAtt WAFWebACL.Arn

  # ───────────────────────────────────────────────────────────
  # 19. CLOUDFRONT
  # ───────────────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub ${ProjectName}-${Environment}
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_200
        Origins:
          - Id: ALBOrigin
            DomainName: !GetAtt ALB.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD, OPTIONS]
          TargetOriginId: ALBOrigin
          ForwardedValues:
            QueryString: true
            Headers:
              - Host
              - Authorization
              - Accept
              - Accept-Language
              - Cookie
            Cookies:
              Forward: all
          Compress: true
          DefaultTTL: 0
          MinTTL: 0
          MaxTTL: 0
        CacheBehaviors:
          # Static Next.js assets — long TTL
          - PathPattern: /_next/static/*
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            TargetOriginId: ALBOrigin
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            Compress: true
            DefaultTTL: 86400
            MinTTL: 86400
            MaxTTL: 31536000
          # API — no cache
          - PathPattern: /api/*
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            TargetOriginId: ALBOrigin
            ForwardedValues:
              QueryString: true
              Headers: [Host, Authorization, Accept]
              Cookies:
                Forward: all
            Compress: false
            DefaultTTL: 0
            MinTTL: 0
            MaxTTL: 0
        ViewerCertificate: !If
          - HasCert
          - AcmCertificateArn: !Ref CloudFrontCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Aliases: !If
          - HasDomain
          - - !Ref DomainName
          - !Ref AWS::NoValue

  # ───────────────────────────────────────────────────────────
  # 20. ROUTE 53 (optional — only when DomainName + HostedZoneId provided)
  # ───────────────────────────────────────────────────────────
  Route53Record:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        EvaluateTargetHealth: false
        HostedZoneId: Z2FDTNDATAQYW2

  # ───────────────────────────────────────────────────────────
  # 21. CI/CD — CODEBUILD
  # ───────────────────────────────────────────────────────────
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_DOCKER_LAYER_CACHE
          - LOCAL_SOURCE_CACHE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: ECR_FRONTEND_URI
            Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRFrontend}
          - Name: ECR_BACKEND_URI
            Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRBackend}
          - Name: ECR_REVERB_URI
            Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRReverb}
          - Name: ENVIRONMENT
            Value: !Ref Environment
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:-latest}
            build:
              commands:
                - docker compose build --parallel
                - docker tag ${ENVIRONMENT}-frontend:latest $ECR_FRONTEND_URI:$IMAGE_TAG
                - docker tag ${ENVIRONMENT}-backend:latest $ECR_BACKEND_URI:$IMAGE_TAG
                - docker tag ${ENVIRONMENT}-reverb:latest $ECR_REVERB_URI:$IMAGE_TAG
            post_build:
              commands:
                - docker push $ECR_FRONTEND_URI:$IMAGE_TAG
                - docker push $ECR_BACKEND_URI:$IMAGE_TAG
                - docker push $ECR_REVERB_URI:$IMAGE_TAG
                - printf '[{"name":"nextjs","imageUri":"%s"}]' $ECR_FRONTEND_URI:$IMAGE_TAG > imagedefs-frontend.json
                - printf '[{"name":"laravel-api","imageUri":"%s"}]' $ECR_BACKEND_URI:$IMAGE_TAG > imagedefs-backend.json
                - printf '[{"name":"laravel-reverb","imageUri":"%s"}]' $ECR_REVERB_URI:$IMAGE_TAG > imagedefs-reverb.json
          artifacts:
            files:
              - imagedefs-frontend.json
              - imagedefs-backend.json
              - imagedefs-reverb.json

  # CodeDeploy Application for ECS Blue/Green
  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-${Environment}-deploy
      ComputePlatform: ECS

  # ───────────────────────────────────────────────────────────
  # 22. CLOUDWATCH ALARMS
  # ───────────────────────────────────────────────────────────
  ALBUnhealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-alb-unhealthy
      AlarmDescription: Alert when ALB target group has unhealthy hosts
      MetricName: UnHealthyHostCount
      Namespace: AWS/ApplicationELB
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ALB.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt ALBTargetGroupAPI.TargetGroupFullName
      AlarmActions:
        - !Ref SNSTopic
      TreatMissingData: notBreaching

  RDSCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-rds-cpu
      AlarmDescription: Alert when RDS CPU > 80%
      MetricName: CPUUtilization
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RDSInstance
      AlarmActions:
        - !Ref SNSTopic

  RDSFreeStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-rds-storage
      AlarmDescription: Alert when RDS free storage < 2GB
      MetricName: FreeStorageSpace
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2000000000
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RDSInstance
      AlarmActions:
        - !Ref SNSTopic

# =============================================================
# OUTPUTS
# =============================================================
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${ProjectName}-${Environment}-vpc-id

  ALBDNSName:
    Description: ALB DNS name (internal endpoint)
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${ProjectName}-${Environment}-alb-dns

  CloudFrontDomain:
    Description: CloudFront domain (public URL)
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Export:
      Name: !Sub ${ProjectName}-${Environment}-cf-domain

  RDSEndpoint:
    Description: RDS MySQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ${ProjectName}-${Environment}-rds-endpoint

  RedisEndpoint:
    Description: ElastiCache Redis primary endpoint
    Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: !Sub ${ProjectName}-${Environment}-redis-endpoint

  S3BucketName:
    Description: S3 storage bucket name
    Value: !Ref S3Bucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-s3-bucket

  SQSQueueUrl:
    Description: SQS job queue URL
    Value: !Ref SQSQueue
    Export:
      Name: !Sub ${ProjectName}-${Environment}-sqs-url

  ECSClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ecs-cluster

  ECRFrontendUri:
    Description: ECR Frontend repository URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRFrontend}
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ecr-frontend

  ECRBackendUri:
    Description: ECR Backend repository URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRBackend}
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ecr-backend

  ECRReverbUri:
    Description: ECR Reverb repository URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRReverb}
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ecr-reverb

  AppSecretArn:
    Description: Secrets Manager ARN (DB password, APP_KEY, OpenAI key)
    Value: !Ref AppSecret
    Export:
      Name: !Sub ${ProjectName}-${Environment}-secret-arn

  CodeBuildProjectName:
    Description: CodeBuild project name (trigger from GitHub Actions)
    Value: !Ref CodeBuildProject
