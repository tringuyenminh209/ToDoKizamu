# Docker Compose for Kizamu AI App

services:
  # Kizamu Backend
  app:
    build: .
    container_name: todo-app-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/nginx.conf:/etc/nginx/sites-available/default
      - ./docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    ports:
      - "8080:80"
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - DB_CONNECTION=pgsql
      - DB_HOST=aws-1-ap-northeast-1.pooler.supabase.com
      - DB_PORT=5432
      - DB_DATABASE=postgres
      - DB_USERNAME=postgres.bajlvdghfgkphhrfqzzv
      - DB_PASSWORD=tringuyenminh209
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-dummy-key}
      # リモート Ollama (52.203.35.157) 使用。ローカル ollama は不要
      - OPENAI_BASE_URL=http://52.203.35.157:11434/v1
      - OPENAI_MODEL=qwen2.5:3b
      # リアルタイム: Reverb WebSocket（モバイル→Web フォーカス同期）
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION:-reverb}
      - REVERB_APP_ID=${REVERB_APP_ID:-todokizamu}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-todokizamu-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-todokizamu-secret}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    depends_on:
      - redis
      - reverb
    networks:
      - todo-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # Laravel Reverb（リアルタイム WebSocket: モバイル→Web フォーカス同期）
  reverb:
    build: .
    container_name: todo-reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8081:8080"
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - REVERB_APP_ID=${REVERB_APP_ID:-todokizamu}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-todokizamu-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-todokizamu-secret}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    networks:
      - todo-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: todo-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - todo-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Next.js Frontend
  frontend:
    image: node:20-alpine
    container_name: todo-app-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8088:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - NEXT_PUBLIC_BACKEND_URL=http://app:80
      - HOSTNAME=0.0.0.0
      - PORT=3000
      # リアルタイム: ブラウザから Reverb WebSocket へ接続（ホスト側ポート 8081）
      - NEXT_PUBLIC_REVERB_APP_KEY=${REVERB_APP_KEY:-todokizamu-key}
      - NEXT_PUBLIC_REVERB_HOST=localhost
      - NEXT_PUBLIC_REVERB_PORT=8081
      - NEXT_PUBLIC_REVERB_SCHEME=http
    depends_on:
      - app
    networks:
      - todo-network

  # Ollama (Local LLM) - 使用リモート 54.204.204.160 のためコメントアウト
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: todo-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - todo-network
  #   environment:
  #     - OLLAMA_GPU_MEMORY=0
  #     - OLLAMA_NUM_PARALLEL=4
  #     - OLLAMA_NUM_CTX=512
  #     - OLLAMA_KEEP_ALIVE=30m
  #     - OLLAMA_NUM_GPU=0
  #     - OLLAMA_MAX_LOADED_MODELS=1
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '6.0'
  #         memory: 3G
  #       reservations:
  #         cpus: '3.0'
  #         memory: 1.5G

volumes:
  redis_data:
    driver: local
  # ollama_data:  # ローカル ollama 不要のためコメント

networks:
  todo-network:
    driver: bridge
