# Reverse proxy: routes traffic from Cloudflare (port 80) to backend containers
# Cloudflare handles HTTPS termination → EC2 receives plain HTTP on port 80
#
# api.todokizamu.me  → Laravel API (app:80) + Reverb WebSocket (reverb:8080)
# todokizamu.me      → Next.js frontend (frontend:3000)
# www.todokizamu.me  → Next.js frontend (frontend:3000)

# ── API + Reverb WebSocket ──────────────────────────────────────────────────
server {
    listen 80;
    server_name api.todokizamu.me;

    # Trust Cloudflare real IP header
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    client_max_body_size 100M;

    # WebSocket upgrade: /app/* → Reverb container
    location /app {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # All other requests → Laravel API container
    location / {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }
}

# ── Frontend ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name todokizamu.me www.todokizamu.me;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
